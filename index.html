<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn English Login page </title>

<!-- daisy ui  and tailwind -->
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


    <style>

    </style>

</head>
<body>
    <header class="py-4 bg-gray-300">
        <nav class="flex justify-between items-center w-10/12 mx-auto">
            <!-- nav left side / logo in left side  -->
            <div class="flex justify-center items-center">
                <h2 class="flex items-center justify-center text-xl font-semibold">English<span><img src="./assets/logo.png" alt=""></span>Janala</h2>
            </div>
            <!-- nav left side / 3 btn -->
            <div class="flex justify-center items-center gap-3">
                <button class="btn btn-outline btn-info flex gap-2"><span><img src="./assets/fa-circle-question.png" alt=""></span>FAQ</button>
                <button class="btn btn-outline btn-info flex gap-2"><span><img src="./assets/fa-book-open.png" alt=""></span>Learn</button>
                <button class="btn btn-outline btn-info flex gap-2"><span><img src="./assets/fa-arrow-right-from-bracket.png" alt=""></span>Logout</button>
            </div>
        </nav>
    </header>

    <!-- banner section -->
<section class="py-12">
    <div class="w-10/12 mx-auto flex flex-col-reverse lg:flex-row items-center justify-between gap-10">

        <!-- Text -->
        <div class="lg:w-1/2 space-y-5">

            <h1 class="text-5xl font-bold">
                <span class="text-blue-500">English</span> is Easy !!
            </h1>

            <p>
                আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা
                আপনার দক্ষতা বাড়াতে চান, আমাদের Interactive Lessons আপনাকে নিয়ে যাবে
                অন্য একটি Level এ।
            </p>

            <input
                type="text"
                placeholder="Enter your Name"
                class="input block input-bordered w-full max-w-sm">

            <input
                type="password"
                placeholder="Password (123456)"
                class="input input-bordered w-full max-w-sm">

            <button class="btn btn-primary block">
                Login
            </button>

        </div>

        <!-- Image -->
        <div class="lg:w-1/2">
            <img src="./assets/hero-student.png" class="w-full" alt="">
        </div>

    </div>
</section>

</body>
</html>
